apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: my-app-backend

  template:
    metadata:
      labels:
        app: my-app-backend

    spec:
      containers:
      - name: my-app-backend-container
        image: dhanushmyt/food-backend:11
        imagePullPolicy: Always

        ports:
        - containerPort: 5000
        envFrom:
        - secretRef:
            name: mysql-secret
